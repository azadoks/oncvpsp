# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "master", "dev", "infra" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix
      matrix:
        os: [ubuntu-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc]
        libxc_version: [5.2.3]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            fortran_compiler: gfortran

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Install packaged dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake
        # 1 # compiler
        sudo apt install -y build-essential gfortran
        # 2 # LAPACK and BLAS
        sudo apt install -y liblapack-dev libblas-dev

    - name: Cache Libxc
      id: cache-libxc
      uses: actions/cache@v4
      with:
        path: |
          ${HOME}/dependencies/libxc-${{ matrix.libxc_version }}
        key: ${{ runner.os }}-${{ matrix.c_compiler }}-libxc-${{ matrix.libxc_version }}

    - name: Compile Libxc
      if: steps.cache-libxc.outputs.cache-hit != 'true'
      run: |
        cd $HOME
        mkdir -p ${HOME}/dependencies/libxc-${{ matrix.libxc_version}}
        wget https://gitlab.com/libxc/libxc/-/archive/${{ matrix.libxc_version }}/libxc-${{ matrix.libxc_version }}.tar.bz2
        tar -xf libxc-${{ matrix.libxc_version }}.tar.bz2
        cd libxc-${{ matrix.libxc_version }}
        mkdir build
        cd build
        cmake .. \
          -DENABLE_FORTRAN=ON \
          -DENABLE_FORTRAN03=ON \
          -DBUILD_TESTING=OFF \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_Fortran_COMPILER=${{ matrix.fortran_compiler }} \
          -DCMAKE_INSTALL_PREFIX=${HOME}/dependencies/libxc-${{ matrix.libxc_version }}
        make install -j

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_Fortran_COMPILER=${{ matrix.fortran_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DWITH_TOML=ON
        -DWITH_Libxc=ON
        -DLibxc_ROOT=$HOME/dependencies/libxc-${{ matrix.libxc_version }}
        -S ${{ github.workspace }}

    - name: Build ONCVPSP with CMake
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: >
        cmake --build ${{ steps.strings.outputs.build-output-dir }}
        --config ${{ matrix.build_type }}

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version-file: "pyproject.toml"

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Install pyoncvpsp
      run: uv sync --locked --all-extras --dev

    - name: Run pytest
      run: uv run pytest -n auto
